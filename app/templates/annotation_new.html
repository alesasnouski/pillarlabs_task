{% extends "base.html" %}
{% block title %}New Annotation{% endblock %}
{% block content %}
<nav>
    <h1>Pick a website and write a prompt</h1>
    <a href="/annotations/"><button class="btn btn-secondary">Back</button></a>
</nav>

<form method="post" action="/annotations/" x-data="annotationForm" @submit="submitting = true">
    <input type="hidden" name="csrf_token" x-ref="csrfToken" value="{{ csrf_token }}">
    <input type="hidden" name="screenshot_path" :value="screenshotUrl ? screenshotUrl.replace('/media/', '') : ''">

    <div class="field">
        <label>Website</label>
        <input type="url" name="url" x-ref="url" @input="onUrlChange()"
               placeholder="https://example.com" required autofocus>
    </div>

    <div class="field" x-show="screenshotLoading || screenshotUrl || screenshotError">
        <div x-show="screenshotLoading" class="screenshot-loading">
            <i data-lucide="loader-2" style="animation: spin 0.8s linear infinite"></i>
            Capturing screenshot…
        </div>
        <div x-show="screenshotError" class="error" x-text="screenshotError"></div>
        <img x-show="screenshotUrl" :src="screenshotUrl" class="screenshot-preview" alt="Page screenshot">
    </div>

    <div class="field">
        <label>Prompt</label>
        <textarea name="prompt" x-ref="prompt" rows="4" required placeholder="What would you like to annotate?"></textarea>
    </div>

    <div class="field">
        <div class="field-header">
            <label>Plan</label>
            <button type="button" class="btn-icon tooltip" data-tip="Generate with AI"
                    :disabled="loading" @click="generate()">
                <i data-lucide="sparkles" x-show="!loading"></i>
                <i data-lucide="loader-2" x-show="loading" style="animation: spin 0.8s linear infinite"></i>
            </button>
        </div>
        <textarea name="plan" rows="20" x-model="plan" placeholder="Step-by-step plan (optional)"></textarea>
    </div>

    <button type="submit" class="btn" :disabled="!canSubmit || submitting">
        <span x-show="!submitting">Start</span>
        <span x-show="submitting"><i data-lucide="loader-2" style="animation: spin 0.8s linear infinite"></i> Starting...</span>
    </button>
    <p x-show="!canSubmit && $refs.url && $refs.url.value" class="muted" style="margin-top: 0.5rem">
        Screenshot required before creating annotation.
    </p>
</form>
{% endblock %}

{% block scripts %}
<script src="/static/js/annotation.js"></script>
{% endblock %}
